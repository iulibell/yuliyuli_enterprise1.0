server:
  port: 8081
spring:
  data:
    redis:
      port: 6379
      host: localhost        
  servlet:
    multipart:
      max-file-size: 3GB
      max-request-size: 3GB
      location: static/videoUrl   
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1000
          multiplier: 2.0
video:
  upload:
    path: ./static/videoUrl
