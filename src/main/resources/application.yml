server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yuliyuli_enterprise?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      port: 6379
      host: localhost
      database: 0        
  servlet:
    multipart:
      max-file-size: 3GB
      max-request-size: 3GB
      location: static/videoUrl   
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1000
          multiplier: 2.0
video:
  upload:
    path: ./static/videoUrl
